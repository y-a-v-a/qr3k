services:
  qr3k:
    build: .
    ports:
      - "8080:80"
    volumes:
      # Mount src/runtime for live development
      - ./src/runtime:/var/www/html
      # Mount encoding library for API access
      - ./src/encoding:/var/www/encoding
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
      # Where generated game/QR URLs should point (see docs/SECURITY.md).
      # Defaults to the production origin when unset.
      - QR3K_RUNTIME_URL=${QR3K_RUNTIME_URL:-}
      - QR3K_QR_IMAGE_URL=${QR3K_QR_IMAGE_URL:-}
    restart: unless-stopped
    container_name: qr3k-runtime