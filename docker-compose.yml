services:
  qr3k:
    build: .
    ports:
      # 8080 is taken by another local project; the container has been running on 8081
      - "8081:80"
    volumes:
      # Mount src/runtime for live development
      - ./src/runtime:/var/www/html
      # Mount encoding library for API access
      - ./src/encoding:/var/www/encoding
      # Mount example games so examples.php can encode them
      - ./src/games:/var/www/games
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
    restart: unless-stopped
    container_name: qr3k-runtime